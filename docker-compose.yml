services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tmf-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      bash -c '
      while ! su - postgres -c "pg_isready"; do sleep 1; done;
      su - postgres -c "psql -c \"CREATE USER \\\"$$POSTGRES_USER\\\" WITH SUPERUSER PASSWORD '\''$$POSTGRES_PASSWORD'\'';\"" || true;
      su - postgres -c "psql -c \"ALTER USER \\\"$$POSTGRES_USER\\\" WITH PASSWORD '\''$$POSTGRES_PASSWORD'\'';\"" || true;
      su - postgres -c "psql -c \"CREATE DATABASE \\\"$$POSTGRES_DB\\\" OWNER \\\"$$POSTGRES_USER\\\";\"" || true;
      su - postgres -c "psql -d \"$$POSTGRES_DB\" -c \"CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;\"" || true;
      su - postgres -c "psql -d \"$$POSTGRES_DB\" -c \"CREATE EXTENSION IF NOT EXISTS pgml CASCADE;\"" || true;
      su - postgres -c "psql -v ON_ERROR_STOP=1 -d \"$$POSTGRES_DB\" -f /schema/schema.sql" || true;
      tail -f /dev/null
      '
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tmf_pg_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./backend/sql/schema.sql:/schema/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  tmf_pg_data:
