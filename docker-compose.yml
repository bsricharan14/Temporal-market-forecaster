services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tmf-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pgml"]
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tmf_pg_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  tmf_pg_data:
