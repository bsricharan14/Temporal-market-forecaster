services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tmf-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Providing fallbacks just in case the .env doesn't load instantly
      POSTGRES_DB: ${DB_NAME:-market_db}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tmf_pg_data:/var/lib/postgresql/data
      # This is the magic line. It runs your init scripts automatically!
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER:-user} -d ${DB_NAME:-market_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tmf_pg_data: